orbs:
  docker: circleci/docker@1.5.0

version: 2.1

executors:
  docker-publisher: 
    environment:
      IMAGE_NAME: docker.io/sundaraswal/sundar
    docker: 
      - image: circleci/node:latest
        auth:
          username: $DOCKERHUB_USERNAME
          password: $DOCKERHUB_PASSWORD

jobs:
  publishLatestToHub: 
    executor: docker-publisher
 
    steps: 
      - checkout

      - setup_remote_docker

      - run: 
          name: Publish Docker Image to Docker Hub
          command: |
            echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker build -t $IMAGE_NAME:latest .
            docker push $IMAGE_NAME:latest

      - run:
          name: Trigger Jenkins CD
          command: |
            CRUMB=$(curl -u $JENKINS_USER:$JENKINS_API_TOKEN \
              "http://34.93.12.180:8080/crumbIssuer/api/json" \
              | python3 -c "import sys, json; print(json.load(sys.stdin)['crumb'])")

            curl -u $JENKINS_USER:$JENKINS_API_TOKEN \
              -H "Jenkins-Crumb:$CRUMB" \
              -X POST "http://34.93.12.180:8080/job/jenkins%20job/build"

workflows:
  version: 2

  build-master:
    jobs:
      - publishLatestToHub
