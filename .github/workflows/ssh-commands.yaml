name: Remote SSH Command

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Execute remote SSH commands using password
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            cd ~/Sundar_jenkins
            git pull origin master

            cd sundar

            docker stop sundar || true
            docker rm sundar || true
            docker build -t sundar .
            docker run -d --name sundar -p 9000:9000 sundar